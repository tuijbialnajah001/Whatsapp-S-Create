<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c2c2e" />
      <stop offset="100%" stop-color="#1c1c1e" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d1d1d6" />
    </linearGradient>
  </defs>

  <!-- Apple-like squircle background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)" />
  
  <!-- Minimalist Sticker Outline -->
  <path d="M 148 132 
           C 130.327 132 116 146.327 116 164 
           V 348 
           C 116 365.673 130.327 380 148 380 
           H 288 
           L 396 272 
           V 164 
           C 396 146.327 381.673 132 364 132 
           Z" 
        fill="none" stroke="url(#iconGradient)" stroke-width="36" stroke-linejoin="round" stroke-miterlimit="10"/>
        
  <!-- Sleek Peeling Corner -->
  <path d="M 288 380 
           V 308 
           C 288 288.118 304.118 272 324 272 
           H 396" 
        fill="none" stroke="url(#iconGradient)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
</svg>
