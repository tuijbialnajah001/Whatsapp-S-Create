<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow" y="-10%" x="-10%" width="120%" height="120%">
      <feDropShadow dx="-4" dy="8" stdDeviation="16" flood-color="#052e16" flood-opacity="0.15" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Base Shape: Rounded rectangle, missing bottom right corner -->
    <path d="M 64 120 
             A 56 56 0 0 1 120 64 
             H 392 
             A 56 56 0 0 1 448 120 
             V 320 
             L 320 448 
             H 120 
             A 56 56 0 0 1 64 392 
             Z" 
          fill="#10B981" />
    
    <!-- Peel Back Flap: Curling up to the left -->
    <!-- Connects from 448,320 to 320,448 curving inward -->
    <path d="M 448 320 
             C 410 320 320 360 320 448 
             C 320 360 360 320 448 320 
             Z" 
          fill="#D1FAE5" />
  </g>

  <!-- Friendly Face -->
  <!-- Left Eye -->
  <circle cx="170" cy="220" r="32" fill="#ffffff" />
  <!-- Right Eye -->
  <circle cx="290" cy="220" r="32" fill="#ffffff" />
  <!-- Smile -->
  <path d="M 160 290 Q 230 360 300 290" stroke="#ffffff" stroke-width="32" stroke-linecap="round" fill="none" />
  
  <!-- A little shine accent on top left -->
  <path d="M 104 140 
           A 32 32 0 0 1 140 104" 
        stroke="#34D399" stroke-width="16" stroke-linecap="round" fill="none" />
</svg>
